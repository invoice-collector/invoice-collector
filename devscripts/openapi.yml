openapi: 3.0.3
info:
  title: Invoice Collector API
  description: API for managing invoice collection, customers, users, credentials,
    and collectors.
  version: 1.0.0
servers:
  - url: https://api.invoice-collector.com/api/v1
    description: Production API
  - url: https://localhost:8080/api/v1
    description: Local API
components:
  securitySchemes:
    CustomerBearerAuth:
      type: http
      scheme: bearer
      description: Bearer token to authenticate the customer.
    UserBearerAuth:
      type: http
      scheme: bearer
      description: Bearer token to authenticate the user.
    TokenAuth:
      type: apiKey
      in: query
      name: token
      description: UI token obtained from POST /user
  schemas:
    locale:
      type: string
      description: Language of the user.
      enum:
        - en
        - fr
      default: en
      example: fr
    bearerResponse:
      type: object
      properties:
        bearer:
          type: string
          description: Bearer token to be used in the Authorization header.
          example: qHcFyrYj.....yQ77/q0=
      required:
        - bearer
    remoteId:
      type: string
      description: Remote id of the user.
      example: R121439
    token:
      type: string
      description: Token to be used by the client. You can get it using the POST /user
        endpoint.
      example: <token>
    resetToken:
      type: string
      description: Token to be used for password reset. You can get it using the POST
        /signup endpoint.
      example: <reset_token>
    credentialId:
      type: string
      description: Id of the credential.
      example: 6776b5258821de266afbc3f6
    userId:
      type: string
      description: Id of the user or _me_ for the current user.
      example: 687f40dab93991306da5ccf3
    credentials:
      type: array
      description: List of credentials.
      items:
        $ref: "#/components/schemas/credential"
    wsPath:
      type: string
      description: WebSocket path to connect to for real-time updates. null if no
        collect is in progress.
      nullable: true
      example: /api/v1/ws/30f6a13e919ceab0094e6df042166210fc00177dd392d2d2ae8b751946cbfecdb7f6e3fec3ec2d93db2a27a364dd6997adc88e439a3b96d34fe7d0257b27a616
    callbackType:
      type: string
      enum:
        - invoice
        - notification_disconnected
      description: Type of event to send to the callback.
      example: invoice
    error:
      type: object
      properties:
        type:
          type: string
          description: Type of the error.
          default: error
          enum:
            - error
          example: error
        message:
          type: string
          description: Error message.
      required:
        - type
        - message
    plan:
      type: object
      properties:
        id:
          type: string
          description: Id of the plan.
          example: basic
        name:
          type: string
          description: Name of the plan.
          example: Basic
        maxUsers:
          type: number
          description: Maximum number of users allowed. If -1, no limit.
          example: 10
        maxCredentials:
          type: number
          description: Maximum number of credentials allowed. If -1, no limit.
          example: 50
        maxInvoicesPerMonth:
          type: number
          description: Maximum number of invoices per month. If -1, no limit.
          example: -1
        maxCollectors:
          type: number
          description: Maximum number of collectors allowed. If -1, no limit.
          example: -1
        priceBase:
          type: number
          description: Base price of the plan in €.
          example: 10
        pricePerUser:
          type: number
          description: Price per additional user in €.
          example: 2.99
        pricePerCredential:
          type: number
          description: Price per additional credential in €.
          example: 0
        pricePerInvoice:
          type: number
          description: Price per additional invoice in €.
          example: 1
        pricePerCollector:
          type: number
          description: Price per additional collector in €.
          example: 0
        features:
          type: array
          description: List of features included in the plan.
          items:
            type: string
          example:
            - 10 users
            - 50 collectors
            - Unlimited invoices per month
      required:
        - id
        - name
        - maxUsers
        - maxCredentials
        - maxInvoicesPerMonth
        - maxCollectors
        - priceBase
        - pricePerUser
        - pricePerCredential
        - pricePerInvoice
        - pricePerCollector
        - features
    userStats:
      type: object
      properties:
        credentialsCount:
          type: integer
    customerStats:
      type: object
      properties:
        usersCount:
          type: integer
        credentialsCount:
          type: integer
    state:
      type: object
      properties:
        index:
          type: number
          description: Index of the state. A negative index means that the state is in
            error. An index equal to max means that the process is finished.
          example: 2
        max:
          type: number
          description: Maximum index of the state. This is used to know the progress.
          example: 6
        title:
          type: string
          description: Title of the state.
          example: 2FA
        message:
          type: string
          description: Message to be displayed to the user.
          example: Please enter the code received by SMS.
      required:
        - index
        - max
        - title
        - message
    collectorParam:
      type: object
      properties:
        type:
          type: string
          description: Type of the parameter.
          enum:
            - string
            - number
            - boolean
            - enum
          example: string
        name:
          type: string
          description: Name of the parameter.
          example: Email
        placeholder:
          type: string
          description: Placeholder of the parameter.
          example: Email of the account
        mandatory:
          type: boolean
          description: Whether the parameter is mandatory or not.
          example: true
      required:
        - type
        - name
        - placeholder
        - mandatory
    collectorConfig:
      type: object
      properties:
        id:
          type: string
          description: Id of the collector.
          example: free
        name:
          type: string
          description: Name of the collector.
          example: Free
        description:
          type: string
          description: Description of the collector.
          example: Free is a French telecommunications company
        instructions:
          type: string
          description: Instructions to setup the collector.
          example: Go to ... and do ...
        version:
          type: string
          description: Version of the collector.
          example: "1"
        type:
          type: string
          description: Type of collector.
          enum:
            - sketch
            - agent
            - web
            - api
          example: web
        website:
          type: string
          description: Link to the website of the collector.
          format: uri
          example: https://www.free.fr
        logo:
          type: string
          description: Link to the logo of the collector.
          format: uri
          example: https://fr.wikipedia.org/wiki/Free_(entreprise)#/media/Fichier:Free_logo.svg
        params:
          type: object
          description: List of parameters that the collector requires.
          additionalProperties:
            $ref: "#/components/schemas/collectorParam"
        captcha:
          type: string
          description: Captcha used by the collector.
          enum:
            - none
            - cloudflare
            - datadome
            - recaptcha
            - other
          example: cloudflare
        enableInteractiveLogin:
          type: boolean
          description: Whether the interactive login is enabled for this collector.
          example: true
        state:
          type: string
          description: State of the collector.
          enum:
            - planned
            - development
            - active
          example: active
        loginUrl:
          type: string
          description: URL to the login page of the collector. For collectors of type
            sketch, web and agent only.
          example: https://www.mycollector.com/login
        entryUrl:
          type: string
          description: URL to the invoices page of the collector. For collectors of type
            web and agent only.
          example: https://www.mycollector.com/customer/invoices
        baseUrl:
          type: string
          description: Base URL of the collector. For collectors of type api only.
          example: https://api.mycollector.com
      required:
        - id
        - name
        - description
        - version
        - type
        - website
        - logo
        - params
        - captcha
        - enableInteractiveLogin
        - state
    customer:
      type: object
      properties:
        id:
          type: string
          description: Id of the customer.
          example: 6795130f170ba4496dc30642
        email:
          type: string
          description: Email of the customer.
          example: customer@company.com
        name:
          type: string
          description: Name of the customer.
          example: Awesome Company Name
        callback:
          type: string
          description: Callback url at which the new invoices are sent.
          example: https://your.infrastructure.com/path/to/callback
        remoteId:
          type: string
          description: Remote id of your company in your system.
          example: R121439
        theme:
          type: string
          description: Theme of the customer.
          example: dark
        subscribedCollectors:
          type: array
          description: List of collector ids the customer is subscribed to.
          items:
            type: string
          example:
            - amazon
            - shopify
            - free
        isSubscribedToAll:
          type: boolean
          description: Whether the customer is subscribed to all collectors. If true, the
            subscribedCollectors field is ignored.
          example: false
        enableInteractiveLogin:
          type: boolean
          description: Whether the customer has enabled interactive login for collectors
            that support it.
          example: true
        displaySketchCollectors:
          type: boolean
          description: Whether to display sketch collectors.
          example: false
        maxDelayBetweenCollect:
          type: number
          description: Maximum delay between two collects in ms.
          example: 2592000000
        plan:
          $ref: "#/components/schemas/plan"
      required:
        - id
        - email
        - name
        - callback
        - theme
        - subscribedCollectors
        - isSubscribedToAll
        - displaySketchCollectors
        - maxDelayBetweenCollect
        - plan
    user:
      type: object
      properties:
        id:
          type: string
          description: Id of the user.
          example: 6776b5258821de266afbc3f6
        customer_id:
          type: string
          description: Id of the customer.
          example: 6795130f170ba4496dc30642
        remote_id:
          $ref: "#/components/schemas/remoteId"
        locale:
          $ref: "#/components/schemas/locale"
      required:
        - id
        - customer_id
        - remote_id
        - locale
    userWithToken:
      allOf:
        - $ref: "#/components/schemas/user"
        - type: object
          properties:
            token:
              type: string
              description: Token to be used by the client.
              example: 69b67c9f...be77ffeb
      required:
        - token
    userListItem:
      allOf:
        - $ref: "#/components/schemas/user"
        - type: object
          properties:
            stats:
              $ref: "#/components/schemas/userStats"
    credential:
      type: object
      properties:
        id:
          type: string
          description: Id of the credential.
          example: 6776b5258821de266afbc3f6
        user_id:
          type: string
          description: Id of the user.
          example: 687108e5dce5050bc8ca53c1
        note:
          type: string
          description: Custom note for this credential.
          example: Regular account
        create_timestamp:
          type: number
          description: Creation timestamp.
          example: 1745229262287
        download_from_timestamp:
          type: number
          description: Download from timestamp.
          example: 1745229203582
        last_collect_timestamp:
          type: number
          description: Last collect timestamp.
          example: 1745229265118
        next_collect_timestamp:
          type: number
          description: Next collect timestamp.
          example: 1746000402000
        invoices:
          type: array
          description: List of invoices collected by this credential.
          items:
            type: object
            properties:
              id:
                type: string
                description: Id of the invoice.
                example: 45FDD1544
              timestamp:
                type: integer
                description: Timestamp when the invoice was created in ms.
                example: 17316031963975
              collected_timestamp:
                type: integer
                description: Timestamp when the invoice was collected in ms. null if the invoice
                  was not collected.
                example: 17316032013467
            required:
              - id
              - timestamp
              - collected_timestamp
        state:
          $ref: "#/components/schemas/state"
        collector:
          $ref: "#/components/schemas/collectorConfig"
        wsPath:
          $ref: "#/components/schemas/wsPath"
      required:
        - id
        - user_id
        - note
        - create_timestamp
        - last_collect_timestamp
        - next_collect_timestamp
        - state
        - invoices
        - collector
        - wsPath
    invoice:
      type: object
      properties:
        id:
          type: string
          description: Id of the invoice.
          example: 45FDD1544
        timestamp:
          type: integer
          description: Timestamp when the invoice was created in ms.
          example: 17316031963975
        collected_timestamp:
          type: integer
          description: Timestamp when the invoice was collected in ms.
          example: 17316032013467
        amount:
          type: string
          description: Amount of the invoice.
          example: 45.78€
        link:
          type: string
          description: Link from which the invoice was downloaded.
          example: https://mycollector/direct/link/to/my/invoice
        data:
          type: string
          description: Base64 encoded invoice.
          example: iVBORw0KGgoAAAAN...RU5ErkJggg==
        mimetype:
          type: string
          description: MIME type of the invoice.
          example: application/pdf
      required:
        - id
        - type
        - mimetype
        - timestamp
        - collected_timestamp
        - link
        - data
tags:
  - name: General
    description: General endpoints (UI, callbacks, feedback)
  - name: Authentication
    description: Login, signup, password reset
  - name: Customer
    description: Customer management
  - name: User
    description: User management
  - name: Credential (Bearer)
    description: Credential and collection management
  - name: Credential (Token)
    description: Credential and collection management
  - name: Collector
    description: Collector listing
paths:
  /ui:
    get:
      tags:
        - General
      summary: Get UI page
      description: Returns a UI page for the user to add credentials.
      security:
        - TokenAuth: []
      parameters:
        - name: credential_id
          in: query
          schema:
            $ref: "#/components/schemas/credentialId"
          description: Id of the credential. If provided, a collect will be started for
            this credential. If a collect is already in progress for this
            credential, the current progress will be shown.
      responses:
        "200":
          description: Rendered HTML page
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /test/callback/{type}:
    get:
      tags:
        - General
      summary: Test callback
      description: Sends a test callback of the specified type. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/callbackType"
      responses:
        "200":
          description: Callback sent successfully
        "400":
          description: Unsupported type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
      callbacks:
        onInvoiceCollected:
          Invoice:
            post:
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      properties:
                        type:
                          $ref: "#/components/schemas/callbackType"
                        remote_id:
                          $ref: "#/components/schemas/remoteId"
                        invoice:
                          $ref: "#/components/schemas/invoice"
                        collector:
                          $ref: "#/components/schemas/collectorConfig"
                      required:
                        - type
                        - remote_id
                        - invoice
                        - collector
              responses:
                "200":
                  description: Success
                "400":
                  description: Error
        onCollectorDisconnected:
          Notification Disconnected:
            post:
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      properties:
                        type:
                          $ref: "#/components/schemas/callbackType"
                        credential_id:
                          $ref: "#/components/schemas/credentialId"
                        user_id:
                          $ref: "#/components/schemas/userId"
                        remote_id:
                          $ref: "#/components/schemas/remoteId"
                        collector:
                          $ref: "#/components/schemas/collectorConfig"
                      required:
                        - type
                        - credential_id
                        - user_id
                        - remote_id
                        - collector
              responses:
                "200":
                  description: Success
                "400":
                  description: Error
  /feedback:
    post:
      tags:
        - General
      summary: Send feedback
      description: Sends feedback to the registry server. Bearer or Token authentication.
      security:
        - CustomerBearerAuth: []
        - UserBearerAuth: []
        - TokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - message
              properties:
                type:
                  type: string
                message:
                  type: string
      responses:
        "200":
          description: Feedback sent successfully
        "400":
          description: Missing field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Authenticates a customer or user and returns a bearer token. No
        authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  bearer:
                    type: string
                  type:
                    type: string
                    enum:
                      - customer
                      - user
        "400":
          description: Missing field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /signup:
    post:
      tags:
        - Authentication
      summary: Sign up
      description: Creates a new customer or user account. No authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - cid
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                cid:
                  type: string
                locale:
                  type: string
                inviteId:
                  type: string
                  description: If provided, creates a user under the customer matching this invite
                    ID
      responses:
        "200":
          description: Signup successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  resetLink:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /forgot:
    post:
      tags:
        - Authentication
      summary: Forgot password
      description: Sends a password reset email. No authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset link sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  resetLink:
                    type: string
        "400":
          description: Account not found or missing field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /reset:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Resets the password using a reset token. No authentication required.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Password reset successfully
        "400":
          description: Missing field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /customer:
    get:
      tags:
        - Customer
      summary: Get customer
      description: Returns the authenticated customer's details. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/customer"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
    put:
      tags:
        - Customer
      summary: Update customer
      description: Updates the authenticated customer's details. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                callback:
                  type: string
                remoteId:
                  type: string
                cid:
                  type: string
                theme:
                  type: string
                subscribedCollectors:
                  type: array
                  items:
                    type: string
                isSubscribedToAll:
                  type: boolean
                enableInteractiveLogin:
                  type: boolean
                displaySketchCollectors:
                  type: boolean
      responses:
        "200":
          description: Updated customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/customer"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /customer/bearer:
    post:
      tags:
        - Customer
      summary: Generate new API bearer
      description: Generates a new API bearer token for the customer. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      responses:
        "200":
          description: New bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bearerResponse"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /customer/stats:
    get:
      tags:
        - Customer
      summary: Get customer stats
      description: Returns statistics for the authenticated customer. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      responses:
        "200":
          description: Customer statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/customerStats"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /users:
    get:
      tags:
        - User
      summary: List users
      description: Returns all users belonging to the authenticated customer. Bearer
        authentication.
      security:
        - CustomerBearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
