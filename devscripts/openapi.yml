openapi: 3.0.3
info:
  title: Invoice Collector API
  description: API for managing invoice collection, customers, users, credentials,
    and collectors.
  version: 1.0.0
servers:
  - url: /api/v1
    description: API v1
components:
  securitySchemes:
    CustomerBearerAuth:
      type: http
      scheme: bearer
      description: Customer bearer token
    UserBearerAuth:
      type: http
      scheme: bearer
      description: User bearer token
    TokenAuth:
      type: apiKey
      in: query
      name: token
      description: UI token obtained from POST /user
  schemas:
    Error:
      type: object
      properties:
        type:
          type: string
          example: error
        message:
          type: string
        reason:
          type: string
    Plan:
      type: object
      properties:
        maxUsers:
          type: integer
        maxCredentials:
          type: integer
    UserStats:
      type: object
      properties:
        credentialsCount:
          type: integer
    CustomerStats:
      type: object
      properties:
        usersCount:
          type: integer
        credentialsCount:
          type: integer
    State:
      type: object
      properties:
        code:
          type: integer
        title:
          type: string
        message:
          type: string
    CollectorParam:
      type: object
      properties:
        name:
          type: string
        placeholder:
          type: string
        mandatory:
          type: boolean
        type:
          type: string
    CollectorConfig:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        instructions:
          type: string
        type:
          type: string
        params:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/CollectorParam"
    Customer:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        callback:
          type: string
        remoteId:
          type: string
        cid:
          type: string
        inviteId:
          type: string
        createdAt:
          type: integer
        theme:
          type: string
        subscribedCollectors:
          type: array
          items:
            type: string
        isSubscribedToAll:
          type: boolean
        enableInteractiveLogin:
          type: boolean
        displaySketchCollectors:
          type: boolean
        maxDelayBetweenCollect:
          type: integer
        plan:
          $ref: "#/components/schemas/Plan"
    User:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        remote_id:
          type: string
        name:
          type: string
        cid:
          type: string
        locale:
          type: string
        createdAt:
          type: integer
        customer:
          type: object
          properties:
            name:
              type: string
            cid:
              type: string
        stats:
          $ref: "#/components/schemas/UserStats"
    UserWithToken:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        remote_id:
          type: string
        name:
          type: string
        cid:
          type: string
        locale:
          type: string
        createdAt:
          type: integer
        token:
          type: string
        stats:
          $ref: "#/components/schemas/UserStats"
    UserListItem:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        remote_id:
          type: string
        name:
          type: string
        cid:
          type: string
        locale:
          type: string
        createdAt:
          type: integer
        stats:
          $ref: "#/components/schemas/UserStats"
    Credential:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        note:
          type: string
        create_timestamp:
          type: integer
        download_from_timestamp:
          type: integer
        last_collect_timestamp:
          type: integer
        next_collect_timestamp:
          type: integer
        invoices:
          type: array
          items:
            type: object
        state:
          $ref: "#/components/schemas/State"
        collector:
          $ref: "#/components/schemas/CollectorConfig"
        wsPath:
          type: string
          nullable: true
tags:
  - name: General
    description: General endpoints (UI, callbacks, feedback)
  - name: Authentication
    description: Login, signup, password reset
  - name: Customer
    description: Customer management
  - name: User
    description: User management
  - name: Credential
    description: Credential and collection management
  - name: Collector
    description: Collector listing
paths:
  /ui:
    get:
      tags:
        - General
      summary: Get UI page
      description: Returns the rendered UI page for the user. Token authentication.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: UI token
      responses:
        "200":
          description: Rendered HTML page
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /test/callback/{type}:
    get:
      tags:
        - General
      summary: Test callback
      description: Sends a test callback of the specified type. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum:
              - invoice
              - notification_disconnected
          description: Callback type to test
      responses:
        "200":
          description: Callback sent successfully
        "400":
          description: Unsupported type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /feedback:
    post:
      tags:
        - General
      summary: Send feedback
      description: Sends feedback to the registry server. Bearer or Token authentication.
      security:
        - CustomerBearerAuth: []
        - UserBearerAuth: []
        - TokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - message
              properties:
                type:
                  type: string
                message:
                  type: string
      responses:
        "200":
          description: Feedback sent successfully
        "400":
          description: Missing field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Authenticates a customer or user and returns a bearer token. No
        authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  bearer:
                    type: string
                  type:
                    type: string
                    enum:
                      - customer
                      - user
        "400":
          description: Missing field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /signup:
    post:
      tags:
        - Authentication
      summary: Sign up
      description: Creates a new customer or user account. No authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - cid
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                cid:
                  type: string
                locale:
                  type: string
                inviteId:
                  type: string
                  description: If provided, creates a user under the customer matching this invite
                    ID
      responses:
        "200":
          description: Signup successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  resetLink:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /forgot:
    post:
      tags:
        - Authentication
      summary: Forgot password
      description: Sends a password reset email. No authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset link sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  resetLink:
                    type: string
        "400":
          description: Account not found or missing field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /reset:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Resets the password using a reset token. No authentication required.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Password reset successfully
        "400":
          description: Missing field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /customer:
    get:
      tags:
        - Customer
      summary: Get customer
      description: Returns the authenticated customer's details. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags:
        - Customer
      summary: Update customer
      description: Updates the authenticated customer's details. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                callback:
                  type: string
                remoteId:
                  type: string
                cid:
                  type: string
                theme:
                  type: string
                subscribedCollectors:
                  type: array
                  items:
                    type: string
                isSubscribedToAll:
                  type: boolean
                enableInteractiveLogin:
                  type: boolean
                displaySketchCollectors:
                  type: boolean
      responses:
        "200":
          description: Updated customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /customer/bearer:
    post:
      tags:
        - Customer
      summary: Generate new API bearer
      description: Generates a new API bearer token for the customer. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      responses:
        "200":
          description: New bearer token
          content:
            application/json:
              schema:
                type: object
                properties:
                  bearer:
                    type: string
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /customer/stats:
    get:
      tags:
        - Customer
      summary: Get customer stats
      description: Returns statistics for the authenticated customer. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      responses:
        "200":
          description: Customer statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerStats"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users:
    get:
      tags:
        - User
      summary: List users
      description: Returns all users belonging to the authenticated customer. Bearer
        authentication.
      security:
        - CustomerBearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserListItem"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /user:
    post:
      tags:
        - User
      summary: Create or get user
      description: Creates a new user or returns an existing one by remote_id. Returns
        a UI token. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - remoteId
                - locale
              properties:
                remoteId:
                  type: string
                  description: Also accepted as remote_id
                locale:
                  type: string
                ip:
                  type: string
                  description: User IP for geolocation
      responses:
        "200":
          description: User details with token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithToken"
        "400":
          description: Missing or invalid field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: User limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - User
      summary: Get current user
      description: Returns the user associated with the bearer token. Bearer
        authentication (user session).
      security:
        - UserBearerAuth: []
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /user/{user_id}:
    get:
      tags:
        - User
      summary: Get user by ID
      description: Returns a specific user by ID. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - User
      summary: Delete user
      description: Deletes a user and all associated credentials. Bearer authentication.
      security:
        - CustomerBearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted successfully
        "400":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /user/{userId}:
    put:
      tags:
        - User
      summary: Update user
      description: Updates a user's details. Bearer authentication.
      security:
        - CustomerBearerAuth: []
        - UserBearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                remoteId:
                  type: string
                name:
                  type: string
                cid:
                  type: string
                locale:
                  type: string
      responses:
        "200":
          description: Updated user details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /user/{user_id}/credentials:
    get:
      tags:
        - Credential
      summary: List credentials (Bearer)
      description: Returns all credentials for a user. Bearer authentication.
      security:
        - CustomerBearerAuth: []
        - UserBearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of credentials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /credentials:
    get:
      tags:
        - Credential
      summary: List credentials (Token)
      description: Returns all credentials for the authenticated user. Token authentication.
      security:
        - CustomerBearerAuth: []
        - TokenAuth: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of credentials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /user/{user_id}/credential:
    post:
      tags:
        - Credential
      summary: Create credential (Bearer)
      description: Creates a new credential and starts collection. Bearer authentication.
      security:
        - CustomerBearerAuth: []
        - UserBearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - collector
                - params
              properties:
                collector:
                  type: string
                  description: Collector ID
                params:
                  type: object
                  description: Collector-specific parameters
                download_from_timestamp:
                  type: integer
                  description: Unix timestamp in ms to download invoices from
      responses:
        "200":
          description: Created credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        "400":
          description: Missing or invalid field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Credential limit reached or collector not subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /credential:
    post:
      tags:
        - Credential
      summary: Create credential (Token)
      description: Creates a new credential and starts collection. Token authentication.
      security:
        - TokenAuth: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - collector
                - params
              properties:
                collector:
                  type: string
                  description: Collector ID
                params:
                  type: object
                  description: Collector-specific parameters
                download_from_timestamp:
                  type: integer
                  description: Unix timestamp in ms to download invoices from
      responses:
        "200":
          description: Created credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        "400":
          description: Missing or invalid field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Credential limit reached or collector not subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /user/{user_id}/credential/{credential_id}:
    get:
      tags:
        - Credential
      summary: Get credential (Bearer)
      description: Returns a specific credential by ID. Bearer authentication.
      security:
        - CustomerBearerAuth: []
        - UserBearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: credential_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        "400":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Credential does not belong to user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Credential
      summary: Delete credential (Bearer)
      description: Deletes a credential. Bearer authentication.
      security:
        - CustomerBearerAuth: []
        - UserBearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: credential_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential deleted successfully
        "400":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Credential does not belong to user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /credential/{credential_id}:
    get:
      tags:
        - Credential
      summary: Get credential (Token)
      description: Returns a specific credential by ID. Token authentication.
      security:
        - TokenAuth: []
      parameters:
        - name: credential_id
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
        "400":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Credential does not belong to user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Credential
      summary: Delete credential (Token)
      description: Deletes a credential. Token authentication.
      security:
        - TokenAuth: []
      parameters:
        - name: credential_id
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential deleted successfully
        "400":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Credential does not belong to user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /user/{user_id}/credential/{credential_id}/2fa:
    post:
      tags:
        - Credential
