name: Check openapi spec

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'devscripts/swaggerConfig.js'
      - 'src/index.ts'
      - 'views/openapi/**'

jobs:
  test-openapi-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run openapi spec tests
        run: npm run test.cicd.openapi
